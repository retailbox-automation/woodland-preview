.ba{display:grid;grid-template-columns:1fr 40px 1fr;gap:8px;align-items:start}.ba-box{background:var(--hover);border:1px solid var(--border);border-radius:6px;padding:14px;font-size:11px}

// === RENDER ===
function showPage(name) {
  const area = document.getElementById('content-area');
  area.textContent = '';
  area.insertAdjacentHTML('beforeend', PAGES[name]());
  animateCounters(area);

  const titles = {dashboard:'Dashboard',contacts:'Contacts',scoring:'Weekly Call Lists',outreach:'Outreach Sequences',listings:'Property Listings',offers:'AI Offer Generator',pipeline:'Deal Pipeline',facebook:'Facebook Lead Mining'};
  document.getElementById('page-title').textContent = titles[name] || '';

  // Page-specific bindings
  if (name === 'dashboard') initDashboard();
  if (name === 'contacts') initContacts();
  if (name === 'scoring') initScoring();
  if (name === 'outreach') initOutreach();
  if (name === 'listings') initListings();
  if (name === 'offers') initOffers();
  if (name === 'pipeline') buildKanban();
}

// === NAV ===
document.querySelectorAll('.nav-item').forEach(n => {
  n.addEventListener('click', function() {
    document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
    this.classList.add('active');
    showPage(this.dataset.page);
  });
});

// === COUNTERS ===
function animateCounters(container) {
  container.querySelectorAll('[data-count]').forEach(el => {
    const target = parseInt(el.dataset.count);
    let cur = 0;
    const step = Math.max(1, Math.floor(target / 40));
    const iv = setInterval(() => {
      cur += step;
      if (cur >= target) { cur = target; clearInterval(iv); }
      el.textContent = cur.toLocaleString();
    }, 30);
  });
  setTimeout(() => {
    container.querySelectorAll('.bar[data-h]').forEach(b => { b.style.height = b.dataset.h + '%'; });
  }, 200);
}

// === TOAST ===
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// === MODAL ===
function openModal(html) {
  document.getElementById('modal-content').textContent = '';
  document.getElementById('modal-content').insertAdjacentHTML('beforeend', html);
  document.getElementById('modal').classList.add('show');
}

  document.getElementById('clock').textContent = d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) + ' - ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}
updateClock(); setInterval(updateClock, 30000);

// === DASHBOARD ===
function initDashboard() {
  const feed = document.getElementById('agent-feed');
  function addFeed() {
    const m = FEED_MSGS[APP.feedIdx % FEED_MSGS.length];
    const now = new Date();
    const t = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    const div = document.createElement('div');
    div.style.cssText = 'padding:6px 0;border-bottom:1px solid var(--border);opacity:0;transform:translateY(-8px);transition:all .4s';
    const time = document.createElement('span');
    time.style.color = 'var(--muted)';
    time.textContent = t + ' - ';
    const agent = document.createElement('span');
    agent.style.color = m[2];
    agent.textContent = m[0] + ' ';
    const msg = document.createTextNode(m[1]);
    div.appendChild(time);
    div.appendChild(agent);
    div.appendChild(msg);
    feed.insertBefore(div, feed.firstChild);
    setTimeout(() => { div.style.opacity = '1'; div.style.transform = 'translateY(0)'; }, 50);
    if (feed.children.length > 15) feed.removeChild(feed.lastChild);
    APP.feedIdx++;
  }
  for (let i = 0; i < 6; i++) setTimeout(addFeed, i * 100);
  setInterval(addFeed, 5000);
}

function initContacts() {
  const tabs = document.getElementById('cat-tabs');
  ['all','owner','company','broker'].forEach(c => {
    const btn = document.createElement('div');
    btn.className = 'tab-btn' + (c === APP.currentCat ? ' active' : '');
    btn.textContent = c === 'all' ? 'All' : c.charAt(0).toUpperCase() + c.slice(1) + 's';
    btn.addEventListener('click', function() {
      tabs.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      this.classList.add('active');
      APP.currentCat = c;
      renderContacts();
    });
    tabs.appendChild(btn);
  });
  document.getElementById('csearch').addEventListener('input', renderContacts);
  document.getElementById('upload-btn').addEventListener('click', simulateUpload);
  renderContacts();
}

function renderContacts() {
  const q = (document.getElementById('csearch') || {}).value || '';
  const tbody = document.getElementById('ctable');
  tbody.textContent = '';
  CONTACTS.filter(c => {
    if (APP.currentCat !== 'all' && c.cat !== APP.currentCat) return false;
    if (q && !c.name.toLowerCase().includes(q.toLowerCase())) return false;
    return true;
  }).forEach(c => {
    const sf = c.score >= 75 ? 's-h' : c.score >= 55 ? 's-m' : 's-l';
    const tr = document.createElement('tr');
    tr.style.cursor = 'pointer';
    tr.addEventListener('click', () => showContactModal(c));

      '<td><strong>'+esc(c.name)+'</strong></td>'+

// === SCORING ===
function initScoring() {
  const slider = document.getElementById('score-slider');
  slider.addEventListener('input', function() {
    document.getElementById('score-val').textContent = this.value;
    renderCallList(parseInt(this.value));
  });
  renderCallList(50);
}

function renderCallList(min) {
  const tbody = document.getElementById('call-tbody');
  tbody.textContent = '';
  const list = CONTACTS.filter(c => c.score >= min).sort((a,b) => b.score - a.score);
  list.forEach((c, i) => {
    const sf = c.score >= 75 ? 's-h' : c.score >= 55 ? 's-m' : 's-l';
    const tr = document.createElement('tr');
    tr.insertAdjacentHTML('beforeend',
      '<td>'+(i+1)+'</td><td><strong>'+esc(c.name)+'</strong></td>'+
      '<td><span class="tag '+catTag[c.cat]+'">'+catLbl[c.cat]+'</span></td>'+
      '<td>+1 (514) 555-0xxx</td>'+
      '<td><div class="score-bar"><div class="score-fill '+sf+'" style="width:'+c.score+'%"></div></div> '+c.score+'</td>'+
      '<td style="font-size:10px;color:var(--muted)">'+esc(c.seg)+'</td>'
    );
    tbody.appendChild(tr);
  });
}

// === OUTREACH ===
function initOutreach() {
  document.getElementById('play-seq-btn').addEventListener('click', playSequence);
}

function playSequence() {
  if (APP.seqPlaying) return;
  APP.seqPlaying = true;
  const steps = document.querySelectorAll('#seq-demo .seq-s');
  steps.forEach(s => { s.classList.remove('done','cur'); });
  let i = 0;
  const iv = setInterval(() => {
    if (i > 0) { steps[i-1].classList.remove('cur'); steps[i-1].classList.add('done'); }
    if (i < steps.length) { steps[i].classList.add('cur'); i++; }
    else { clearInterval(iv); APP.seqPlaying = false; showToast('Sequence complete - contact enters nurture cycle'); }
  }, 800);
}

function runScrape() {
  const btn = document.getElementById('scrape-btn');
  const prog = document.getElementById('scrape-prog');
  const fill = prog.querySelector('.progress-fill');
  btn.textContent = 'Scraping Centris...';
  btn.style.opacity = '.6';
  prog.style.display = 'block';
  fill.style.width = '0';
  setTimeout(() => fill.style.width = '30%', 200);
  setTimeout(() => { fill.style.width = '60%'; btn.textContent = 'Scraping LoopNet...'; }, 1200);
  setTimeout(() => { fill.style.width = '90%'; btn.textContent = 'Filtering...'; }, 2200);
  setTimeout(() => {
    fill.style.width = '100%';
    btn.textContent = '4 new found!';
    btn.style.color = 'var(--green)';
    showToast('Scrape complete: 51 checked, 4 new matches');
    setTimeout(() => { btn.textContent = 'Run Scrape'; btn.style.opacity = ''; btn.style.color = ''; prog.style.display = 'none'; }, 4000);
  }, 3000);
}

  document.getElementById('offer-pct').addEventListener('input', updateOffer);

function updateOffer() {
  const pct = parseInt(document.getElementById('offer-pct').value);
  const assessed = 1450000;
  const price = Math.round(assessed * pct / 100);
  const noi = 66240;
  const cap = (noi / price * 100).toFixed(2);
  const door = Math.round(price / 8);
  document.getElementById('offer-pct-val').textContent = pct + '%';
  document.getElementById('o-price').textContent = '$' + price.toLocaleString();
  document.getElementById('o-cap').textContent = cap + '%';
  document.getElementById('o-door').textContent = '$' + door.toLocaleString();
  document.getElementById('lp').textContent = '$' + price.toLocaleString();
  document.getElementById('lpct').textContent = pct + '%';
}

function runUpload() {
  const icon = document.getElementById('drop-icon');
  const txt = document.getElementById('drop-txt');
  const prog = document.getElementById('up-prog');
  const fill = document.getElementById('up-fill');
  const result = document.getElementById('up-result');
  icon.textContent = '...';
  txt.textContent = 'Processing sud_ouest_owners_2026.csv...';
  prog.style.display = 'block'; fill.style.width = '0';
  setTimeout(() => { fill.style.width = '25%'; txt.textContent = 'Detecting: Owners list'; }, 500);
  setTimeout(() => { fill.style.width = '50%'; txt.textContent = 'Deduplicating vs 13,247...'; }, 1500);
  setTimeout(() => { fill.style.width = '75%'; txt.textContent = 'Clay enrichment triggered...'; }, 2500);
  setTimeout(() => { fill.style.width = '100%'; txt.textContent = 'Done!'; icon.textContent = '&#10003;'; }, 3500);
  setTimeout(() => {
    result.style.display = 'block';
    const lines = [
      {color:'var(--green)',text:'247 new contacts added'},
      {color:'var(--orange)',text:'12 duplicates merged'},
      {color:'var(--blue)',text:'247 Clay enrichments triggered'},
      {color:'var(--purple)',text:'38 high-score (>70)'},
    ];
    result.textContent = '';
    lines.forEach(l => {
      const d = document.createElement('div');
      d.style.color = l.color;
      d.textContent = l.text;
      result.appendChild(d);
    });
    showToast('247 owners added from CSV');
  }, 4000);
}

// === KANBAN ===
function buildKanban() {
  const k = document.getElementById('kanban');
  k.textContent = '';
  COLS.forEach(col => {
    const colDeals = DEALS.filter(d => d.col === col.id);
    const div = document.createElement('div');
    div.className = 'kanban-col';
    div.dataset.col = col.id;
    div.addEventListener('dragover', function(e) { e.preventDefault(); this.classList.add('drag-over'); });
    div.addEventListener('dragleave', function() { this.classList.remove('drag-over'); });
    div.addEventListener('drop', function(e) {
      e.preventDefault(); this.classList.remove('drag-over');
      const idx = e.dataTransfer.getData('text/plain');
      DEALS[idx].col = col.id;
      buildKanban();
      showToast('Deal moved to ' + col.label);
    });

    const header = document.createElement('div');
    header.className = 'kanban-header';
    header.style.color = col.color;
    header.textContent = col.label + ' ';
    const cnt = document.createElement('span');
    cnt.className = 'kanban-count';
    cnt.textContent = colDeals.length;
    header.appendChild(cnt);
    div.appendChild(header);

    colDeals.forEach(d => {
      const globalIdx = DEALS.indexOf(d);
      const card = document.createElement('div');
      card.className = 'k-card';
      card.draggable = true;
      card.addEventListener('dragstart', function(e) { e.dataTransfer.setData('text/plain', String(globalIdx)); this.classList.add('dragging'); });
      card.addEventListener('dragend', function() { this.classList.remove('dragging'); });
      card.addEventListener('click', function() { showDealModal(d); });
      const h4 = document.createElement('h4');
      h4.textContent = d.title;
      const p = document.createElement('p');
      p.textContent = d.desc;
      const pr = document.createElement('div');
      pr.className = 'price';
      pr.textContent = d.price;
      card.appendChild(h4);
      card.appendChild(p);
      if (d.note) { const n = document.createElement('p'); n.style.cssText = 'color:var(--orange);font-size:9px;margin-top:2px'; n.textContent = d.note; card.appendChild(n); }
      card.appendChild(pr);
      div.appendChild(card);
    });
    k.appendChild(div);
  });
}

function showDealModal(d) {
  const stage = COLS.find(c => c.id === d.col);
  openModal(
    '<div class="modal-header"><h3>'+esc(d.title)+'</h3><button class="modal-close" onclick="document.getElementById(\'modal\').classList.remove(\'show\')">&times;</button></div>'+
    '<div class="detail-row"><span class="detail-label">Stage</span><span class="detail-value">'+esc(stage.label)+'</span></div>'+
    '<div class="detail-row"><span class="detail-label">Details</span><span class="detail-value">'+esc(d.desc)+'</span></div>'+
    '<div class="detail-row"><span class="detail-label">Value</span><span class="detail-value" style="color:var(--green);font-weight:600">'+esc(d.price)+'</span></div>'+
    (d.note ? '<div class="detail-row"><span class="detail-label">Note</span><span class="detail-value" style="color:var(--orange)">'+esc(d.note)+'</span></div>' : '')+
    '<div style="margin-top:16px;display:flex;gap:8px"><span class="btn btn-p">Open HubSpot</span><span class="btn">Add Note</span></div>'
  );
}

// === SYNC TIMER ===
setInterval(() => {
  APP.syncSec += 5;
  const min = Math.floor(APP.syncSec / 60);
  document.getElementById('last-sync').textContent = min < 1 ? 'Last sync: just now' : 'Last sync: ' + min + ' min ago';
}, 5000);

// === INIT ===
showPage('dashboard');
</script>
